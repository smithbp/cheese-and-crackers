<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Club - Nominations</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">📚 Book Club</h1>
            <div class="nav-menu">
                <div class="dropdown">
                    <button class="dropbtn">Menu ▼</button>
                    <div class="dropdown-content">
                        <a href="index.html">Home</a>
                        <a href="members.html">Member List</a>
                        <a href="calendar.html">Calendar</a>
                        <a href="books-read.html">Books Read</a>
                        <a href="nominations.html">Book Nominations</a>
                        <a href="voting.html">Voting</a>
                    </div>
                </div>
                <div id="userInfo" class="user-info"></div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📝 Book Nominations</h1>
            <p>Submit your book suggestions for the next book club selection!</p>
        </div>

        <div id="nominationsGrid" class="books-grid">
            <p class="loading">Loading nominations...</p>
        </div>

        <div class="nomination-form-section">
            <h2>Nominate a Book</h2>
            <form id="nominationForm" onsubmit="submitNomination(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="bookTitle">Book Title *</label>
                        <input type="text" id="bookTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="bookAuthor">Author *</label>
                        <input type="text" id="bookAuthor" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="amazonLink">Amazon Link</label>
                        <input type="url" id="amazonLink" placeholder="https://amazon.com/...">
                    </div>
                    <div class="form-group">
                        <label for="goodreadsLink">Goodreads Link</label>
                        <input type="url" id="goodreadsLink" placeholder="https://goodreads.com/...">
                    </div>
                </div>

                <div class="form-group">
                    <label>Book Cover Image</label>
                    <div class="image-upload-options">
                        <div class="upload-option">
                            <input type="radio" name="imageOption" id="imageUrl" value="url" checked>
                            <label for="imageUrl">Image URL</label>
                            <input type="url" id="imageUrlInput" placeholder="https://example.com/image.jpg">
                        </div>
                        <div class="upload-option">
                            <input type="radio" name="imageOption" id="imageUpload" value="upload">
                            <label for="imageUpload">Upload Image</label>
                            <input type="file" id="imageFile" accept="image/*" style="display: none;">
                            <button type="button" onclick="document.getElementById('imageFile').click()" class="btn btn-secondary btn-small">Choose File</button>
                            <span id="fileName"></span>
                        </div>
                    </div>
                </div>

                <div id="nominationMessage" class="message"></div>
                
                <button type="submit" class="btn btn-primary btn-large">Submit Nomination</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Book Club. Powered by books and friendship.</p>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await initAuth();
            loadNominations();
            
            // Update file name display
            document.getElementById('imageFile').addEventListener('change', function(e) {
                const fileName = e.target.files[0]?.name || '';
                document.getElementById('fileName').textContent = fileName;
            });
        });

        async function loadNominations() {
            try {
                const response = await apiCall('/getNominations');
                const grid = document.getElementById('nominationsGrid');
                
                if (response.success && response.nominations.length > 0) {
                    const currentUser = JSON.parse(localStorage.getItem('bookClubUser')) || {};
                    grid.innerHTML = response.nominations.map(book => {
                        const canRemove = currentUser.isAdmin === true || (currentUser.id && currentUser.id === book.nominatedById);
                        return `
                        <div class="book-card">
                            <div class="book-card-image">
                                ${book.imageUrl ? `<img src="${book.imageUrl}" alt="${book.title}">` : '<div class="no-image">📚</div>'}
                            </div>
                            <div class="book-card-content">
                                <h3>${book.title}</h3>
                                <p class="author">by ${book.author}</p>
                                <p class="nominated-by">Nominated by: ${book.nominatedBy}</p>
                                <p class="nomination-date">${new Date(book.dateNominated).toLocaleDateString()}</p>
                                <div class="book-links">
                                    ${book.amazonLink ? `<a href="${book.amazonLink}" target="_blank" class="btn btn-secondary btn-small">Amazon</a>` : ''}
                                    ${book.goodreadsLink ? `<a href="${book.goodreadsLink}" target="_blank" class="btn btn-secondary btn-small">Goodreads</a>` : ''}
                                    ${canRemove ? `<button class="btn btn-danger btn-small" onclick="confirmRemove('${book.id}')">Remove</button>` : ''}
                                </div>
                            </div>
                        </div>
                    `}).join('');
                } else {
                    grid.innerHTML = '<p class="no-data">No nominations yet. Be the first to nominate a book!</p>';
                }
            } catch (error) {
                console.error('Error loading nominations:', error);
                document.getElementById('nominationsGrid').innerHTML = '<p class="error">Failed to load nominations</p>';
            }
        }

        async function submitNomination(event) {
            event.preventDefault();
            
            const title = document.getElementById('bookTitle').value;
            const author = document.getElementById('bookAuthor').value;
            const amazonLink = document.getElementById('amazonLink').value;
            const goodreadsLink = document.getElementById('goodreadsLink').value;
            const messageDiv = document.getElementById('nominationMessage');
            
            messageDiv.className = 'message';
            messageDiv.textContent = 'Submitting nomination...';
            
            try {
                let imageUrl = '';
                const imageOption = document.querySelector('input[name="imageOption"]:checked').value;
                
                if (imageOption === 'url') {
                    imageUrl = document.getElementById('imageUrlInput').value;
                } else if (imageOption === 'upload') {
                    const fileInput = document.getElementById('imageFile');
                    if (fileInput.files.length > 0) {
                        // Upload image to Google Drive
                        const uploadResponse = await uploadImage(fileInput.files[0]);
                        if (uploadResponse.success) {
                            imageUrl = uploadResponse.url;
                        } else {
                            throw new Error('Image upload failed');
                        }
                    }
                }
                
                const response = await apiCall('/addNomination', {
                    title: title,
                    author: author,
                    amazonLink: amazonLink,
                    goodreadsLink: goodreadsLink,
                    imageUrl: imageUrl
                });
                
                if (response.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Book nominated successfully!';
                    
                    document.getElementById('nominationForm').reset();
                    document.getElementById('fileName').textContent = '';
                    
                    setTimeout(() => {
                        messageDiv.textContent = '';
                        loadNominations();
                    }, 2000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = response.message || 'Failed to submit nomination';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Error submitting nomination. Please try again.';
                console.error('Submit nomination error:', error);
            }
        }

        async function uploadImage(file) {
            const reader = new FileReader();
            
            return new Promise((resolve, reject) => {
                reader.onload = async function(e) {
                    try {
                        const base64Data = e.target.result.split(',')[1];
                        const response = await apiCall('/uploadImage', {
                            fileName: file.name,
                            mimeType: file.type,
                            data: base64Data
                        });
                        resolve(response);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function confirmRemove(id) {
            if (!confirm('Are you sure you want to remove this nomination?')) return;
            try {
                const response = await apiCall('/removeNomination', { id: id });
                if (response.success) {
                    loadNominations();
                } else {
                    showToast(response.message || 'Failed to remove nomination', 'error');
                }
            } catch (error) {
                console.error('Remove nomination error:', error);
                showToast('Error removing nomination', 'error');
            }
        }
    </script>
</body>
</html>
